name: Baam2.0 CI/CD Pipeline

on:
    push:
        branches:
            - deploy_config
    pull_request:
        branches:
            - main
    workflow_dispatch:

jobs:
    backend-build:
        runs-on: ubuntu-latest
        steps:
            - name: Code Clone
              uses: actions/checkout@v4

            - name: GitHub Container Registry Login
              uses: docker/login-action@v3
              with:
                registry: ghcr.io
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and Push Backend Docker Image
              uses: docker/build-push-action@v5
              with:
                context: ./backend
                push: true
                tags: ghcr.io/night-pizza/baam-2.0/baam2-backend:latest

    frontend-build:
        runs-on: ubuntu-latest
        steps:
            - name: Code Clone
              uses: actions/checkout@v4

            - name: GitHub Container Registry Login
              uses: docker/login-action@v3
              with:
                registry: ghcr.io
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and Push Frontend Docker Image
              uses: docker/build-push-action@v5
              with:
                context: ./frontend
                push: true
                tags: ghcr.io/night-pizza/baam-2.0/baam2-frontend:latest

    deploy:
        runs-on: self-hosted
        needs: [backend-build, frontend-build]
        steps:
            - name: Deploy to Server
              run: |
                cd /root/baam2.0
                sudo docker compose pull
                sudo docker compose up -d
                  